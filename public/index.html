<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CGNAT Check</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; }
    .card { max-width: 900px; padding: 1.25rem 1.5rem; border: 1px solid #ddd; border-radius: 14px; }
    .row { margin: .35rem 0; }
    .pill { display:inline-block; padding:.15rem .55rem; border-radius:999px; font-weight:800; }
    .ok { color:#0a7a2f; background:#eaf7ef; }
    .warn { color:#b45309; background:#fff4e6; }
    .bad { color:#b91c1c; background:#fdecec; }
    .muted { color:#555; font-size: 0.95rem; }
    code { background:#f6f6f6; padding:0.15rem 0.35rem; border-radius:6px; }
    button { padding:.5rem .75rem; border-radius:10px; border:1px solid #ddd; background:#fff; cursor:pointer; }
    button:hover { background:#f8f8f8; }
    hr { border:none; border-top:1px solid #eee; margin:1rem 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CGNAT Check</h1>
    <div id="headline" class="row">Checking…</div>
    <div id="summary" class="row muted"></div>

    <hr/>

    <div class="row"><strong>Signals</strong></div>
    <div class="row" id="sig_cf"></div>
    <div class="row" id="sig_stun"></div>

    <hr/>

    <div class="row"><strong>Detected families</strong></div>
    <div class="row muted" id="families"></div>

    <hr/>

    <div class="row"><strong>Cloudflare (optional context)</strong></div>
    <div class="row muted" id="cfmeta"></div>

    <hr/>

    <button id="copyBtn" style="display:none;">Copy detected IPs</button>
    <div class="row muted" id="note"></div>
  </div>

<script>
  function isIPv6(ip) { return typeof ip === "string" && ip.includes(":"); }
  function isIPv4(ip) { return typeof ip === "string" && /^\\d{1,3}(\\.\\d{1,3}){3}$/.test(ip); }

  function ipv4ToInt(ip) {
    const p = ip.split(".").map(Number);
    if (p.length !== 4 || p.some(n => Number.isNaN(n) || n < 0 || n > 255)) return null;
    return ((p[0] << 24) >>> 0) + (p[1] << 16) + (p[2] << 8) + p[3];
  }
  function inCidr4(ip, base, maskBits) {
    const ipInt = ipv4ToInt(ip);
    const baseInt = ipv4ToInt(base);
    if (ipInt === null || baseInt === null) return false;
    const mask = maskBits === 0 ? 0 : (0xFFFFFFFF << (32 - maskBits)) >>> 0;
    return (ipInt & mask) === (baseInt & mask);
  }
  function classifyIPv4(ip) {
    if (inCidr4(ip, "100.64.0.0", 10)) return { type: "cgnat", label: "CGNAT IPv4 (100.64.0.0/10)" };
    if (inCidr4(ip, "10.0.0.0", 8)) return { type: "private", label: "Private IPv4 (10/8)" };
    if (inCidr4(ip, "172.16.0.0", 12)) return { type: "private", label: "Private IPv4 (172.16/12)" };
    if (inCidr4(ip, "192.168.0.0", 16)) return { type: "private", label: "Private IPv4 (192.168/16)" };
    if (inCidr4(ip, "127.0.0.0", 8)) return { type: "reserved", label: "Loopback IPv4 (127/8)" };
    if (inCidr4(ip, "169.254.0.0", 16)) return { type: "reserved", label: "Link-local IPv4 (169.254/16)" };
    if (inCidr4(ip, "224.0.0.0", 4)) return { type: "reserved", label: "Multicast IPv4 (224/4)" };
    return { type: "public", label: "Public routable IPv4" };
  }

  function classifyIPv6(ipRaw) {
    const ip = (ipRaw || "").toLowerCase();
    if (ip === "::1") return { type: "reserved", label: "Loopback IPv6 (::1)" };
    if (ip.startsWith("fe80:")) return { type: "reserved", label: "Link-local IPv6 (fe80::/10)" };
    if (ip.startsWith("fc") || ip.startsWith("fd")) return { type: "private", label: "ULA IPv6 (fc00::/7)" };
    if (ip.startsWith("2001:db8:")) return { type: "reserved", label: "Documentation IPv6 (2001:db8::/32)" };
    if (ip.startsWith("2") || ip.startsWith("3")) return { type: "public", label: "Public routable IPv6" };
    return { type: "unknown", label: "IPv6 (unclassified/reserved)" };
  }

  function classifyIP(ip) {
    if (!ip) return { type: "unknown", label: "Unavailable" };
    if (isIPv6(ip)) return classifyIPv6(ip);
    if (isIPv4(ip)) return classifyIPv4(ip);
    return ip.includes(":") ? classifyIPv6(ip) : classifyIPv4(ip);
  }

  async function getWebRTCServerReflexiveIPs(timeoutMs = 3500) {
    const RTCPeerConnectionCtor = window.RTCPeerConnection || window.webkitRTCPeerConnection;
    if (!RTCPeerConnectionCtor) return { ipv4: null, ipv6: null };

    const pc = new RTCPeerConnectionCtor({
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" }
      ]
    });

    let done = false;
    const foundV4 = new Set();
    const foundV6 = new Set();

    function extractIP(candidateStr) {
      const parts = candidateStr.split(" ");
      for (const token of parts) {
        if (/^\\d{1,3}(\\.\\d{1,3}){3}$/.test(token)) return token;
        if (/^[0-9a-fA-F:]+$/.test(token) && token.includes(":")) return token;
      }
      return null;
    }

    return await new Promise(async (resolve) => {
      const timer = setTimeout(() => {
        if (done) return;
        done = true;
        try { pc.close(); } catch {}
        resolve({ ipv4: [...foundV4][0] || null, ipv6: [...foundV6][0] || null });
      }, timeoutMs);

      pc.onicecandidate = (event) => {
        if (!event.candidate || done) return;
        const cand = event.candidate.candidate || "";
        if (!cand.includes(" typ srflx ")) return;

        const ip = extractIP(cand);
        if (!ip) return;
        if (isIPv6(ip)) foundV6.add(ip);
        else if (isIPv4(ip)) foundV4.add(ip);
      };

      try {
        pc.createDataChannel("cgnatcheck");
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
      } catch (e) {
        clearTimeout(timer);
        if (!done) {
          done = true;
          try { pc.close(); } catch {}
          resolve({ ipv4: null, ipv6: null });
        }
        return;
      }

      const poll = setInterval(() => {
        if (done) return clearInterval(poll);
        const v4 = [...foundV4][0] || null;
        const v6 = [...foundV6][0] || null;
        if (v4 || v6) {
          clearInterval(poll);
          setTimeout(() => {
            if (done) return;
            clearTimeout(timer);
            done = true;
            try { pc.close(); } catch {}
            resolve({ ipv4: [...foundV4][0] || null, ipv6: [...foundV6][0] || null });
          }, 350);
        }
      }, 150);
    });
  }

  function setPill(el, text, kind) {
    el.innerHTML = '<span class="pill ' + kind + '">' + text + '</span>';
  }
  function fmtSignal(name, ip) {
    if (!ip) return name + ': <span class="muted">unavailable</span>';
    const info = classifyIP(ip);
    return name + ': <code>' + ip + '</code> — <span class="muted">' + info.label + '</span>';
  }
  function escapeHtml(s) {
    return String(s)
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;").replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  async function run() {
    const headline = document.getElementById("headline");
    const summary = document.getElementById("summary");
    const sigCF = document.getElementById("sig_cf");
    const sigSTUN = document.getElementById("sig_stun");
    const families = document.getElementById("families");
    const cfmeta = document.getElementById("cfmeta");
    const copyBtn = document.getElementById("copyBtn");
    const note = document.getElementById("note");

    let cfIP = null, cfData = null;

    try {
      const res = await fetch("/ip", { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to fetch /ip (HTTP " + res.status + ")");
      const data = await res.json();
      cfIP = data.ip || null;
      cfData = data.cf || null;
    } catch (e) {
      setPill(headline, "❌ Check failed", "bad");
      summary.textContent = String(e);
      return;
    }

    const stun = await getWebRTCServerReflexiveIPs();
    const stunV4 = stun.ipv4;
    const stunV6 = stun.ipv6;

    sigCF.innerHTML = fmtSignal("Cloudflare sees", cfIP);

    const stunParts = [];
    if (stunV4) stunParts.push(fmtSignal("WebRTC/STUN (IPv4)", stunV4));
    if (stunV6) stunParts.push(fmtSignal("WebRTC/STUN (IPv6)", stunV6));
    sigSTUN.innerHTML = stunParts.length ? stunParts.join("<br/>") : 'WebRTC/STUN: <span class="muted">unavailable</span>';

    const observed = new Set();
    if (cfIP) observed.add(isIPv6(cfIP) ? "IPv6" : "IPv4");
    if (stunV4) observed.add("IPv4");
    if (stunV6) observed.add("IPv6");
    families.textContent = observed.size ? [...observed].join(" + ") : "none";

    const cfInfo = classifyIP(cfIP);
    const stunInfoV4 = stunV4 ? classifyIP(stunV4) : { type: "unknown" };

    const anyCGNAT = (cfInfo.type === "cgnat") || (stunInfoV4.type === "cgnat");
    const anyPublic = (cfInfo.type === "public")
      || (stunV4 && classifyIP(stunV4).type === "public")
      || (stunV6 && classifyIP(stunV6).type === "public");

    if (anyCGNAT) {
      setPill(headline, "⚠️ Likely CGNAT detected (IPv4)", "warn");
      summary.textContent = "At least one IPv4 signal indicates CGNAT space (100.64.0.0/10).";
    } else if (anyPublic) {
      setPill(headline, "✅ Public routable address detected", "ok");
      summary.textContent = "At least one signal indicates a publicly routable address (not the CGNAT range).";
    } else {
      setPill(headline, "❌ Not publicly routable signal detected", "bad");
      summary.textContent = "Signals look private/reserved, not directly routable on the public internet.";
    }

    if (cfData) {
      const bits = [];
      if (cfData.asn) bits.push("ASN <code>" + cfData.asn + "</code>");
      if (cfData.asOrganization) bits.push("Org <code>" + escapeHtml(cfData.asOrganization) + "</code>");
      if (cfData.city || cfData.region || cfData.country) {
        const loc = [cfData.city, cfData.region, cfData.country].filter(Boolean).join(", ");
        bits.push("Location <code>" + escapeHtml(loc) + "</code>");
      }
      if (cfData.colo) bits.push("Colo <code>" + escapeHtml(cfData.colo) + "</code>");
      if (cfData.timezone) bits.push("TZ <code>" + escapeHtml(cfData.timezone) + "</code>");
      cfmeta.innerHTML = bits.length ? bits.join(" · ") : '<span class="muted">No Cloudflare metadata available.</span>';
    } else {
      cfmeta.innerHTML = '<span class="muted">No Cloudflare metadata available.</span>';
    }

    if (observed.size === 1) {
      note.innerHTML =
        "Note: Only <strong>" + [...observed][0] + "</strong> was observed. A single HTTP request only has one IP family. You’ll usually see both only if WebRTC reveals the other family or you force A-only/AAAA-only hostnames.";
    } else if (!stunV4 && !stunV6) {
      note.innerHTML =
        "Note: WebRTC/STUN signal is unavailable (blocked by browser/privacy settings or network policy). Results are based on Cloudflare-only.";
    } else {
      note.textContent = "";
    }

    const lines = [];
    if (cfIP) lines.push("Cloudflare: " + cfIP + " (" + classifyIP(cfIP).label + ")");
    if (stunV4) lines.push("WebRTC/STUN IPv4: " + stunV4 + " (" + classifyIP(stunV4).label + ")");
    if (stunV6) lines.push("WebRTC/STUN IPv6: " + stunV6 + " (" + classifyIP(stunV6).label + ")");

    copyBtn.style.display = lines.length ? "inline-block" : "none";
    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(lines.join("\\n"));
        copyBtn.textContent = "Copied!";
        setTimeout(() => (copyBtn.textContent = "Copy detected IPs"), 1200);
      } catch {
        alert(lines.join("\\n"));
      }
    };
  }

  run();
</script>
</body>
</html>
