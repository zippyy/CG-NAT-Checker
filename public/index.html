<!doctype html>
<html>
<head><meta charset="utf-8"><title>CGNAT Dual Layer</title>
<style>
body{font-family:system-ui;margin:2rem}
.pill{padding:.2rem .6rem;border-radius:999px;font-weight:bold}
.ok{background:#eaf7ef;color:#0a7a2f}
.bad{background:#fdecec;color:#b91c1c}
.warn{background:#fff4e6;color:#b45309}
code{background:#f6f6f6;padding:.2rem .4rem;border-radius:6px}
</style>
</head>
<body>
<h2>CGNAT + Inbound (Dual Layer)</h2>
<div id="signals"></div><hr>
Host: <input id="host" style="width:260px">
<button onclick="runProbe()">Run</button>
<div id="probe"></div>
<hr><button onclick="copyReport()">Copy Report</button>
<script>
let lastProbe=null,cfData=null;
fetch("/ip").then(r=>r.json()).then(d=>{
 cfData=d;
 document.getElementById("host").value=d.ip||"";
 document.getElementById("signals").innerHTML=
  "Cloudflare IP: <code>"+d.ip+"</code><br>"+
  "ASN/Org: "+(d.cf?.asn||"n/a")+" / "+(d.cf?.asOrganization||"n/a");
});
function runProbe(){
 const host=document.getElementById("host").value.trim();
 fetch("/probe?host="+encodeURIComponent(host))
 .then(r=>r.json()).then(d=>{
  lastProbe=d;
  const el=document.getElementById("probe");
  if(!d.result||d.result.tcpReachable===false){
    el.innerHTML='<span class="pill bad">❌ TCP Not Reachable</span>';
  }else{
    const tcp='<span class="pill ok">TCP Reachable</span>';
    const http=d.result.ok?
      '<span class="pill ok">HTTP 2xx</span>':
      '<span class="pill warn">HTTP '+d.result.status+'</span>';
    el.innerHTML=tcp+" "+http+"<br><code>"+d.target+"</code>";
  }
 });
}
function copyReport(){
 const lines=[];const ts=new Date().toISOString();
 lines.push("CGNAT Dual Layer Report ("+ts+")");
 if(cfData){
  lines.push("Cloudflare IP: "+cfData.ip);
  lines.push("ASN/Org: "+(cfData.cf?.asn||"n/a")+" / "+(cfData.cf?.asOrganization||"n/a"));
 }
 if(lastProbe){
  lines.push("");lines.push("Inbound:");
  lines.push("Target: "+lastProbe.target);
  if(!lastProbe.result||lastProbe.result.tcpReachable===false){
    lines.push("TCP Reachable: NO");
  }else{
    lines.push("TCP Reachable: YES");
    lines.push("HTTP Status: "+lastProbe.result.status+" (ok="+lastProbe.result.ok+")");
  }
 }
 navigator.clipboard.writeText(lines.join("\n"));
}
</script>
</body>
</html>
