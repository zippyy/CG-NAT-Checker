<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CGNAT + Inbound Check</title>
</head>
<body>
<h1>CGNAT + Inbound Hosting Check</h1>

<div id="result"></div>

<hr/>

<h3>Inbound HTTP Check</h3>
Host: <input id="host" placeholder="example.com or your IPv4">
Port: <input id="port" value="80" size="5">
<button onclick="runProbe()">Run Probe</button>

<div id="probe"></div>

<script>
function ipv4ToInt(ip) {
  const p = ip.split(".").map(Number);
  if (p.length !== 4) return null;
  return ((p[0]<<24)>>>0)+(p[1]<<16)+(p[2]<<8)+p[3];
}
function inCidr4(ip, base, maskBits) {
  const ipInt = ipv4ToInt(ip);
  const baseInt = ipv4ToInt(base);
  const mask = (0xFFFFFFFF << (32-maskBits))>>>0;
  return (ipInt & mask)===(baseInt & mask);
}

fetch("/ip").then(r=>r.json()).then(data=>{
  const ip = data.ip;
  let msg = "Detected IP: "+ip+"<br>";
  if (inCidr4(ip,"100.64.0.0",10)) {
    msg += "<b>RFC6598 CGNAT range detected</b>";
  } else {
    msg += "Not in RFC6598 CGNAT range";
  }
  document.getElementById("result").innerHTML = msg;
});

function runProbe(){
  const host=document.getElementById("host").value;
  const port=document.getElementById("port").value;
  fetch("/probe?host="+host+"&port="+port)
    .then(r=>r.json())
    .then(d=>{
      if(d.error){
        document.getElementById("probe").innerText="Error: "+d.error;
      } else {
        document.getElementById("probe").innerText="Status: "+d.status+" OK: "+d.ok;
      }
    });
}
</script>

</body>
</html>
