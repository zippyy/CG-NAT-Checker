<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CGNAT Check</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; }
    .card { max-width: 980px; padding: 1.25rem 1.5rem; border: 1px solid #ddd; border-radius: 14px; }
    .row { margin: .35rem 0; }
    .pill { display:inline-block; padding:.15rem .55rem; border-radius:999px; font-weight:800; }
    .ok { color:#0a7a2f; background:#eaf7ef; }
    .warn { color:#b45309; background:#fff4e6; }
    .bad { color:#b91c1c; background:#fdecec; }
    .muted { color:#555; font-size: 0.95rem; }
    code { background:#f6f6f6; padding:0.15rem 0.35rem; border-radius:6px; }
    button { padding:.5rem .75rem; border-radius:10px; border:1px solid #ddd; background:#fff; cursor:pointer; }
    button:hover { background:#f8f8f8; }
    hr { border:none; border-top:1px solid #eee; margin:1rem 0; }
    .grid { display:grid; grid-template-columns: 1fr; gap: .5rem; }
    @media(min-width: 800px){ .grid { grid-template-columns: 1fr 1fr; } }
    .box { border:1px solid #eee; border-radius:12px; padding:.75rem; }
    .box h3 { margin:.1rem 0 .4rem; font-size: 1.02rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CGNAT Check</h1>
    <div id="headline" class="row">Checking…</div>
    <div id="summary" class="row muted"></div>

    <hr/>

    <div class="grid">
      <div class="box">
        <h3>IPv4 view (forced)</h3>
        <div class="row" id="v4sig"></div>
        <div class="row muted" id="v4meta"></div>
      </div>
      <div class="box">
        <h3>IPv6 view (forced)</h3>
        <div class="row" id="v6sig"></div>
        <div class="row muted" id="v6meta"></div>
      </div>
    </div>

    <hr/>

    <div class="row muted" id="note"></div>
    <button id="copyBtn" style="display:none;">Copy detected IPs</button>
  </div>

<script>
  function ipv4ToInt(ip) {
    const p = ip.split(".").map(Number);
    if (p.length !== 4 || p.some(n => Number.isNaN(n) || n < 0 || n > 255)) return null;
    return ((p[0] << 24) >>> 0) + (p[1] << 16) + (p[2] << 8) + p[3];
  }
  function inCidr4(ip, base, maskBits) {
    const ipInt = ipv4ToInt(ip);
    const baseInt = ipv4ToInt(base);
    if (ipInt === null || baseInt === null) return false;
    const mask = maskBits === 0 ? 0 : (0xFFFFFFFF << (32 - maskBits)) >>> 0;
    return (ipInt & mask) === (baseInt & mask);
  }
  function classifyIPv4(ip) {
    if (!ip) return { type: "unknown", label: "Unavailable" };
    if (inCidr4(ip, "100.64.0.0", 10)) return { type: "cgnat", label: "CGNAT IPv4 (100.64.0.0/10)" };
    if (inCidr4(ip, "10.0.0.0", 8) || inCidr4(ip, "172.16.0.0", 12) || inCidr4(ip, "192.168.0.0", 16))
      return { type: "private", label: "Private IPv4 (RFC1918)" };
    return { type: "public", label: "Public routable IPv4 (not CGNAT range)" };
  }

  function fmtCF(data){
    if (!data || !data.cf) return "";
    const cf = data.cf;
    const bits = [];
    if (cf.asn) bits.push("ASN " + cf.asn);
    if (cf.asOrganization) bits.push(cf.asOrganization);
    if (cf.country) bits.push(cf.country);
    return bits.join(" · ");
  }

  async function getJson(url, timeoutMs=5000){
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), timeoutMs);
    try{
      const r = await fetch(url, { cache:"no-store", signal: ctrl.signal });
      if(!r.ok) throw new Error("HTTP " + r.status);
      return await r.json();
    } finally {
      clearTimeout(t);
    }
  }

  function endpoint(sub){
    return "https://" + sub + ".cgnat.xyz/ip";
  }

  async function run(){
    const headline = document.getElementById("headline");
    const summary  = document.getElementById("summary");
    const v4sig = document.getElementById("v4sig");
    const v6sig = document.getElementById("v6sig");
    const v4meta = document.getElementById("v4meta");
    const v6meta = document.getElementById("v6meta");
    const note = document.getElementById("note");
    const copyBtn = document.getElementById("copyBtn");

    let v4 = null, v6 = null;

    try { v4 = await getJson(endpoint("ipv4")); }
    catch(e){ v4 = { ip:null, error:String(e) }; }

    try { v6 = await getJson(endpoint("ipv6")); }
    catch(e){ v6 = { ip:null, error:String(e) }; }

    if(v4.ip){
      const c = classifyIPv4(v4.ip);
      v4sig.innerHTML = `IPv4: <code>${v4.ip}</code> — <span class="muted">${c.label}</span>` + (v4.gateway ? ` <span class="muted">(gateway: ${v4.gateway})</span>` : "");
      v4meta.textContent = fmtCF(v4);
    } else {
      v4sig.innerHTML = `IPv4: <span class="muted">unavailable</span> <span class="muted">(${v4.error || "unknown error"})</span>`;
      v4meta.textContent = "";
    }

    if(v6.ip){
      v6sig.innerHTML = `IPv6: <code>${v6.ip}</code> — <span class="muted">Public routable IPv6 (if present)</span>` + (v6.gateway ? ` <span class="muted">(gateway: ${v6.gateway})</span>` : "");
      v6meta.textContent = fmtCF(v6);
    } else {
      v6sig.innerHTML = `IPv6: <span class="muted">unavailable</span> <span class="muted">(${v6.error || "unknown error"})</span>`;
      v6meta.textContent = "";
    }

    if(v4.ip){
      const c = classifyIPv4(v4.ip);
      if(c.type === "cgnat"){
        headline.innerHTML = `<span class="pill warn">⚠️ Likely CGNAT detected (IPv4)</span>`;
        summary.textContent = "Your observed IPv4 address is in the CGNAT range (100.64.0.0/10).";
      } else if (c.type === "public") {
        headline.innerHTML = `<span class="pill ok">✅ IPv4 is public (not CGNAT range)</span>`;
        summary.textContent = "Your observed IPv4 address is not in the CGNAT range.";
      } else {
        headline.innerHTML = `<span class="pill bad">❌ IPv4 is not publicly routable</span>`;
        summary.textContent = "Your observed IPv4 address looks private/reserved (not public internet routable).";
      }
    } else {
      headline.innerHTML = `<span class="pill bad">❌ IPv4 check failed</span>`;
      summary.textContent = "Could not obtain an IPv4 signal from ipv4.cgnat.xyz.";
    }

    note.textContent = v6.ip ? "" : "Note: IPv6 endpoint failed (no IPv6 connectivity from this client, or a network policy blocked it).";

    const lines = [];
    if(v4.ip) lines.push("IPv4: " + v4.ip);
    if(v6.ip) lines.push("IPv6: " + v6.ip);
    copyBtn.style.display = lines.length ? "inline-block" : "none";
    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(lines.join("\\n"));
        copyBtn.textContent = "Copied!";
        setTimeout(()=>copyBtn.textContent="Copy detected IPs", 1200);
      } catch {
        alert(lines.join("\\n"));
      }
    };
  }

  run();
</script>
</body>
</html>
